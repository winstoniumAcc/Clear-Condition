<h2>Submissions</h2>
<div id="list"></div>

<script>
async function load() {
  const res = await fetch("https://clear-condition.onrender.com/submissions");
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div style="margin-bottom:20px">
        <p>${item.name} - ${item.task} (${item.status})</p>
        <video src="https://clear-condition.onrender.com/videos/${item.file}" controls width="200"></video><br>
        <button onclick="approve('${item.id}')">Approve</button>
        <button onclick="reject('${item.id}')">Reject</button>
      </div>
    `;
  });
}

async function approve(id) {
  await fetch("https://clear-condition.onrender.com/approve/" + id, { method: "POST" });
  load();
}

async function reject(id) {
  await fetch("https://clear-condition.onrender.com/reject/" + id, { method: "POST" });
  load();
}

load();
</script>
