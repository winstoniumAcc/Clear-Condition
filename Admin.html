<h2>Submissions</h2>
<div id="list"></div>

<button class="btn btn-danger w-100 mt-3" onclick="startQTE()">
  ⚡ Start QTE Event
</button>

<script>
async function checkAdmin() {
  const pass = prompt("Enter admin password:");

  const res = await fetch("https://clear-condition.onrender.com/admin-login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ password: pass })
  });

  if (!res.ok) {
    document.body.innerHTML = "<h1>Access Denied</h1>";
    return false;
  }

  const data = await res.json();

  if (!data.success) {
    document.body.innerHTML = "<h1>Access Denied</h1>";
    return false;
  }

  return true;
}

async function load() {
  const res = await fetch("https://clear-condition.onrender.com/submissions");
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div style="margin-bottom:20px">
        <p>${item.name} - ${item.task} (${item.status})</p>
        <video src="https://clear-condition.onrender.com/videos/${item.file}" controls width="200"></video><br>
        <button onclick="approve('${item.id}')">Approve</button>
        <button onclick="reject('${item.id}')">Reject</button>
      </div>
    `;
  });
}

async function approve(id) {
  await fetch("https://clear-condition.onrender.com/approve/" + id, { method: "POST" });
  load();
}

async function reject(id) {
  await fetch("https://clear-condition.onrender.com/reject/" + id, { method: "POST" });
  load();
}

async function startQTE() {
  try {
    const res = await fetch("https://clear-condition.onrender.com/start-qte", {
      method: "POST"
    });

    const text = await res.text();

    if (!res.ok) {
      alert("Failed: " + text);
      return;
    }

    alert("⚡ QTE Started!");
    console.log("QTE response:", text);

  } catch (err) {
    console.error(err);
    alert("Error starting QTE");
  }
}

(async () => {
  const ok = await checkAdmin();
  if (ok) {
    load();

    // // 🔥 start auto refresh ONLY after login
    // setInterval(load, 3000);
  }
})();
</script>
