<h2>Submissions</h2>
<div id="list"></div>

<input id="qteTitle" class="form-control mb-2" placeholder="Event title">
<input id="qteCountdown" type="number" class="form-control mb-2" placeholder="Countdown (seconds)">
<input id="qteDuration" type="number" class="form-control mb-2" placeholder="Active duration (seconds)">

<button onclick="startQTE()" class="btn btn-primary w-100">Start QTE</button>
<button onclick="endQTE()" class="btn btn-danger w-100 mt-2">End QTE</button>

<select id="qteType" class="form-control mb-2">
  <option value="question">Question</option>
  <option value="video">Video</option>
  <option value="photo">Photo</option>
</select>

<input id="qteTitle" class="form-control mb-2" placeholder="Title">
<textarea id="qteText" class="form-control mb-2" placeholder="Task Text"></textarea>

<input id="qteAnswer" class="form-control mb-2" placeholder="Answer (only for question)">
<input id="qteReward" class="form-control mb-2" placeholder="Reward points">

<script>
async function checkAdmin() {
  const pass = prompt("Enter admin password:");

  const res = await fetch("https://clear-condition.onrender.com/admin-login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ password: pass })
  });

  if (!res.ok) {
    document.body.innerHTML = "<h1>Access Denied</h1>";
    return false;
  }

  const data = await res.json();

  if (!data.success) {
    document.body.innerHTML = "<h1>Access Denied</h1>";
    return false;
  }

  return true;
}

async function load() {
  const res = await fetch("https://clear-condition.onrender.com/submissions");
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div style="margin-bottom:20px">
        <p>${item.name} - ${item.task} (${item.status})</p>
        <video src="https://clear-condition.onrender.com/videos/${item.file}" controls width="200"></video><br>
        <button onclick="approve('${item.id}')">Approve</button>
        <button onclick="reject('${item.id}')">Reject</button>
      </div>
    `;
  });
}

async function approve(id) {
  await fetch("https://clear-condition.onrender.com/approve/" + id, { method: "POST" });
  load();
}

async function reject(id) {
  await fetch("https://clear-condition.onrender.com/reject/" + id, { method: "POST" });
  load();
}

async function startQTE() {
  const type = document.getElementById("qteType").value;
  const title = document.getElementById("qteTitle").value;
  const text = document.getElementById("qteText").value;
  const answer = document.getElementById("qteAnswer").value;
  const reward = Number(document.getElementById("qteReward").value) || 0;

  const countdown = Number(document.getElementById("qteCountdown").value || 0);
  const duration = Number(document.getElementById("qteDuration").value || 0);

  let task = {
    type,
    title,
    text,
    reward
  };

  // 🔥 only question type needs answer
  if (type === "question") {
    task.answer = answer;
  }

  await fetch("https://clear-condition.onrender.com/start-qte", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      countdown,
      activeDuration: duration,
      title,
      task
    })
  });

  alert("QTE Started!");
}

async function endQTE() {
  await fetch("/end-qte", {
    method: "POST"
  });
}

async function endQTEAdmin() {

  try {
    await fetch("https://clear-condition.onrender.com/admin/end-qte", {
      method: "POST"
    });

    alert("🛑 QTE ended");

  } catch (err) {
    console.error(err);
    alert("⚠️ Error ending QTE");
  }
}

(async () => {
  const ok = await checkAdmin();
  if (ok) {
    load();

    // // 🔥 start auto refresh ONLY after login
    // setInterval(load, 3000);
  }
})();
</script>
