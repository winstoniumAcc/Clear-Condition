<h2>Submissions</h2>
<div id="list"></div>

<input id="qteTitleInput" class="form-control mb-2" placeholder="Event title">
<input id="qteCountdownInput" type="number" class="form-control mb-2" placeholder="Countdown (seconds)">
<input id="qteDurationInput" type="number" class="form-control mb-2" placeholder="Active duration (seconds)">

<button onclick="startQTE()" class="btn btn-primary w-100">Start QTE</button>
<button onclick="endQTE()" class="btn btn-danger w-100 mt-2">End QTE</button>

<script>
async function checkAdmin() {
  const pass = prompt("Enter admin password:");

  const res = await fetch("https://clear-condition.onrender.com/admin-login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ password: pass })
  });

  if (!res.ok) {
    document.body.innerHTML = "<h1>Access Denied</h1>";
    return false;
  }

  const data = await res.json();

  if (!data.success) {
    document.body.innerHTML = "<h1>Access Denied</h1>";
    return false;
  }

  return true;
}

async function load() {
  const res = await fetch("https://clear-condition.onrender.com/submissions");
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div style="margin-bottom:20px">
        <p>${item.name} - ${item.task} (${item.status})</p>
        <video src="https://clear-condition.onrender.com/videos/${item.file}" controls width="200"></video><br>
        <button onclick="approve('${item.id}')">Approve</button>
        <button onclick="reject('${item.id}')">Reject</button>
      </div>
    `;
  });
}

async function approve(id) {
  await fetch("https://clear-condition.onrender.com/approve/" + id, { method: "POST" });
  load();
}

async function reject(id) {
  await fetch("https://clear-condition.onrender.com/reject/" + id, { method: "POST" });
  load();
}

async function startQTE() {
  const title = document.getElementById("qteTitleInput").value || "Quick Time Event";
  const countdown = parseInt(document.getElementById("qteCountdownInput").value) || 0;
  const activeDuration = parseInt(document.getElementById("qteDurationInput").value) || 0;

  await fetch("https://clear-condition.onrender.com/start-qte", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title,
      countdown,
      activeDuration
    })
  });
}

async function endQTE() {
  await fetch("/end-qte", {
    method: "POST"
  });
}

async function endQTEAdmin() {

  try {
    await fetch("https://clear-condition.onrender.com/admin/end-qte", {
      method: "POST"
    });

    alert("🛑 QTE ended");

  } catch (err) {
    console.error(err);
    alert("⚠️ Error ending QTE");
  }
}

(async () => {
  const ok = await checkAdmin();
  if (ok) {
    load();

    // // 🔥 start auto refresh ONLY after login
    // setInterval(load, 3000);
  }
})();
</script>
