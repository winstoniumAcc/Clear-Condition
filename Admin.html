<h2>Submissions</h2>
<div id="list"></div>

<h3 class="mt-4">⚡ Start QTE Event</h3>

<input id="qteTitle" class="form-control mb-2" placeholder="QTE Title (e.g. Freeze!)">

<input id="qteDuration" type="number" class="form-control mb-2" placeholder="Duration (seconds)">

<button class="btn btn-danger w-100" onclick="startQTEAdmin()">
  🚀 Start QTE
</button>

<button class="btn btn-secondary w-100 mt-2" onclick="endQTEAdmin()">
  🛑 End QTE
</button>

<script>
async function checkAdmin() {
  const pass = prompt("Enter admin password:");

  const res = await fetch("https://clear-condition.onrender.com/admin-login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ password: pass })
  });

  if (!res.ok) {
    document.body.innerHTML = "<h1>Access Denied</h1>";
    return false;
  }

  const data = await res.json();

  if (!data.success) {
    document.body.innerHTML = "<h1>Access Denied</h1>";
    return false;
  }

  return true;
}

async function load() {
  const res = await fetch("https://clear-condition.onrender.com/submissions");
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div style="margin-bottom:20px">
        <p>${item.name} - ${item.task} (${item.status})</p>
        <video src="https://clear-condition.onrender.com/videos/${item.file}" controls width="200"></video><br>
        <button onclick="approve('${item.id}')">Approve</button>
        <button onclick="reject('${item.id}')">Reject</button>
      </div>
    `;
  });
}

async function approve(id) {
  await fetch("https://clear-condition.onrender.com/approve/" + id, { method: "POST" });
  load();
}

async function reject(id) {
  await fetch("https://clear-condition.onrender.com/reject/" + id, { method: "POST" });
  load();
}

async function startQTEAdmin() {

  const title = document.getElementById("qteTitle").value || "Quick Event!";
  const duration = parseInt(document.getElementById("qteDuration").value) || 10;

  try {
    const res = await fetch("https://clear-condition.onrender.com/admin/start-qte", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        title: title,
        duration: duration
      })
    });

    const data = await res.json();

    if (data.success) {
      alert("✅ QTE started!");
    } else {
      alert("❌ Failed to start QTE");
    }

  } catch (err) {
    console.error(err);
    alert("⚠️ Server error");
  }
}

async function endQTEAdmin() {

  try {
    await fetch("https://clear-condition.onrender.com/admin/end-qte", {
      method: "POST"
    });

    alert("🛑 QTE ended");

  } catch (err) {
    console.error(err);
    alert("⚠️ Error ending QTE");
  }
}

(async () => {
  const ok = await checkAdmin();
  if (ok) {
    load();

    // // 🔥 start auto refresh ONLY after login
    // setInterval(load, 3000);
  }
})();
</script>
